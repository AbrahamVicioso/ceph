# =============================================================================
# Prometheus — configuración de scrape para Ceph
# Archivo: prometheus/prometheus.yml
# =============================================================================

global:
  scrape_interval:     15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'ceph-prod'
    environment: 'production'

alerting:
  alertmanagers:
    - static_configs:
        - targets: []   # Agrega tu Alertmanager aquí si lo tienes

rule_files:
  - "/etc/prometheus/rules/*.yml"

scrape_configs:

  # Ceph MGR — métricas nativas del cluster (mgr1 activo, mgr2 standby)
  - job_name: 'ceph_mgr'
    static_configs:
      - targets:
          - 'mgr1:9283'
          - 'mgr2:9283'
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance

  # HAProxy — endpoint Prometheus nativo (HAProxy 2.x)
  - job_name: 'haproxy'
    static_configs:
      - targets:
          - 'haproxy:8404'
    metrics_path: '/metrics'

  # Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets:
          - 'localhost:9090'