# =============================================================================
# HAProxy — Load Balancer para Ceph RADOS Gateway
# Archivo: haproxy/haproxy.cfg
# =============================================================================

global
    log         stdout format raw local0
    maxconn     50000

defaults
    log     global
    mode    http
    option  httplog
    option  dontlognull
    option  forwardfor
    option  http-server-close
    timeout connect 5s
    timeout client  30s
    timeout server  30s

# -----------------------------------------------------------------------------
# Stats (dashboard de HAProxy)
# -----------------------------------------------------------------------------
listen stats
    bind *:8404
    stats enable
    stats uri /stats
    stats refresh 10s
    stats auth admin:haproxy_stats_2024
    stats show-legends
    stats show-node
    # Endpoint Prometheus (sin auth para que el scraper pueda accederlo)
    http-request use-service prometheus-exporter if { path /metrics }

# -----------------------------------------------------------------------------
# Frontend S3 HTTP
# -----------------------------------------------------------------------------
frontend ceph_s3_http
    bind *:80
    default_backend ceph_rgw_backends

# -----------------------------------------------------------------------------
# Backend RGW (round-robin con health check)
# -----------------------------------------------------------------------------
backend ceph_rgw_backends
    balance         roundrobin
    option          httpchk GET /
    http-check      expect status 200-404

    server rgw1 172.20.0.50:7480 check inter 10s fall 3 rise 2
    server rgw2 172.20.0.51:7481 check inter 10s fall 3 rise 2 backup
